<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Short - Shorts API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5b21b6;
            --secondary: #00f2ea;
            --accent: #ff0050;
            --dark: #09090b;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        a {text-decoration: underline;}
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--dark); color: #fff; line-height: 1.6; min-height: 100vh; padding: 2rem; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 20% 30%, rgba(91, 33, 182, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(0, 242, 234, 0.1) 0%, transparent 50%); }

        .container { max-width: 900px; margin: 0 auto; }
        header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.2rem; font-weight: 800; background: linear-gradient(90deg, #fff, var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }

        .card { background: var(--glass); border: 1px solid var(--glass-border); padding: 2rem; border-radius: 1.5rem; backdrop-filter: blur(20px); margin-bottom: 2rem; }
        h2 { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; color: var(--secondary); font-size: 1.5rem; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.85rem; color: rgba(255,255,255,0.7); }
        input, select, textarea { width: 100%; padding: 0.7rem 1rem; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 0.6rem; color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--secondary); }

        .btn { padding: 0.8rem 1.5rem; border-radius: 99px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
        .btn-primary { background: var(--secondary); color: var(--dark); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 234, 0.3); }
        .btn-ghost { background: none; border: 1px solid var(--glass-border); color: #fff; }
        .btn-ghost:hover { background: rgba(255,255,255,0.05); }

        .chip-container { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .chip { background: var(--primary); color: #fff; padding: 0.3rem 0.8rem; border-radius: 99px; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem; }
        .chip i { cursor: pointer; opacity: 0.7; }
        .chip i:hover { opacity: 1; }

        .alert { padding: 1rem; border-radius: 0.8rem; margin-top: 1rem; font-size: 0.9rem; border: 1px solid transparent; }
        .alert-success { background: rgba(0, 255, 0, 0.1); border-color: lime; color: #69f0ae; }
        .alert-error { background: rgba(255, 0, 0, 0.1); border-color: var(--accent); color: #ff5252; }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div id="app" class="container">
        <header>
            <a href="index.html" class="logo"><i data-lucide="play-circle"></i> Shorts API</a>
            <div style="display: flex; gap: 1rem;">
                <a href="register.html" class="btn btn-ghost" style="padding: 0.5rem 1rem;">Registrar Site</a>
            </div>
        </header>

        <div class="card">
            <h2><i data-lucide="zap"></i> Sincronizar Vídeo</h2>
            
            <form @submit.prevent="syncShort">
                <div class="form-group">
                    <label>API Key (Obrigatório)</label>
                    <input type="password" v-model="form.apiKey" placeholder="Sua chave secreta" required style="width: 100%;">
                </div>

                <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 1rem 0 2rem;">

                <div class="grid">
                    <div class="form-group">
                        <label>ID do Vídeo (Único)</label>
                        <input v-model="form.shortId" placeholder="ex: 123456" required>
                    </div>
                    <div class="form-group">
                        <label>Título</label>
                        <input v-model="form.title" placeholder="Título do vídeo" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Resumo/Legenda</label>
                    <textarea v-model="form.excerpt" rows="3" placeholder="O que acontece nesse vídeo?"></textarea>
                </div>

                <div class="grid">
                    <div class="form-group">
                        <label>URL do Vídeo (MP4)</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input v-model="newVideoUrl" placeholder="https://cdn.com/video.mp4" @keyup.enter.prevent="addVideo">
                            <button type="button" @click="addVideo" class="btn btn-primary" style="padding: 0.5rem 1rem;">+</button>
                        </div>
                        <div class="chip-container">
                            <span v-for="(v, i) in form.video_urls" :key="i" class="chip">
                                {{ v.split('/').pop().substring(0, 15) }}...
                                <span @click="form.video_urls.splice(i, 1)" style="cursor:pointer; margin-left:5px">✕</span>
                            </span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Miniatura (Thumbnail)</label>
                        <input v-model="form.featured_image" placeholder="https://cdn.com/thumb.jpg">
                    </div>
                </div>

                <div class="grid">
                    <div class="form-group">
                        <label>Post URL (Link Original)</label>
                        <input v-model="form.post_url" placeholder="https://meusite.com/video-123">
                    </div>
                    <div class="form-group">
                        <label>Data de Publicação</label>
                        <input type="datetime-local" v-model="form.post_date">
                    </div>
                </div>

                <div class="grid">
                    <div class="form-group">
                        <label>Categorias</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input v-model="newCat" placeholder="Nome da Categoria" @keyup.enter.prevent="addCat">
                            <button type="button" @click="addCat" class="btn btn-ghost" style="padding: 0.5rem 1rem;">+</button>
                        </div>
                        <div class="chip-container">
                            <span v-for="(c, i) in form.categories" :key="i" class="chip">
                                {{ c.name }}
                                <span @click="form.categories.splice(i, 1)" style="cursor:pointer; margin-left:5px">✕</span>
                            </span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Tags</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input v-model="newTag" placeholder="Tag" @keyup.enter.prevent="addTag">
                            <button type="button" @click="addTag" class="btn btn-ghost" style="padding: 0.5rem 1rem;">+</button>
                        </div>
                        <div class="chip-container">
                            <span v-for="(t, i) in form.tags" :key="i" class="chip">
                                {{ t.name }}
                                <span @click="form.tags.splice(i, 1)" style="cursor:pointer; margin-left:5px">✕</span>
                            </span>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 2rem; display: flex; justify-content: flex-end;">
                    <button type="submit" class="btn btn-primary" :disabled="loading" style="padding: 1rem 3rem;">
                        <i v-if="loading" data-lucide="refresh-cw" class="animate-spin"></i>
                        {{ loading ? 'Sincronizando...' : 'Enviar Agora' }}
                    </button>
                </div>
            </form>

            <div v-if="success" class="alert alert-success">
                <i data-lucide="check-circle"></i> Sincronizado com sucesso!
            </div>
            <div v-if="error" class="alert alert-error">
                <i data-lucide="alert-circle"></i> {{ error }}
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const loading = ref(false);
                const error = ref(null);
                const success = ref(false);
                const newVideoUrl = ref('');
                const newCat = ref('');
                const newTag = ref('');

                const form = reactive({
                    apiKey: localStorage.getItem('shorts_last_api_key') || '',
                    shortId: '',
                    title: '',
                    excerpt: '',
                    status: 'publish',
                    video_urls: [],
                    featured_image: '',
                    post_url: '',
                    post_date: new Date().toISOString().slice(0, 16),
                    categories: [],
                    tags: [],
                    author_id: 1
                });

                const addVideo = () => {
                    if (newVideoUrl.value) {
                        form.video_urls.push(newVideoUrl.value);
                        newVideoUrl.value = '';
                    }
                };

                const addCat = () => {
                   if (newCat.value) {
                       form.categories.push({ id: Date.now(), name: newCat.value, slug: newCat.value.toLowerCase().replace(/ /g, '-') });
                       newCat.value = '';
                   }
                };

                const addTag = () => {
                   if (newTag.value) {
                       form.tags.push({ id: Date.now(), name: newTag.value, slug: newTag.value.toLowerCase().replace(/ /g, '-') });
                       newTag.value = '';
                   }
                };

                const syncShort = async () => {
                    loading.value = true;
                    error.value = null;
                    success.value = false;

                    localStorage.setItem('shorts_last_api_key', form.apiKey);

                    try {
                        const { apiKey, ...payload } = form;
                        const res = await fetch('https://shorts.albreis.com.br/api/sync', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'X-API-Key': apiKey
                            },
                            body: JSON.stringify(payload)
                        });

                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error || 'Erro ao sincronizar');

                        success.value = true;
                        form.shortId = '';
                        form.title = '';
                        form.video_urls = [];
                        
                        nextTick(() => lucide.createIcons());
                    } catch (e) {
                        error.value = e.message;
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(() => lucide.createIcons());

                return { form, loading, error, success, newVideoUrl, newCat, newTag, addVideo, addCat, addTag, syncShort };
            }
        }).mount('#app');
    </script>
</body>
</html>
