<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Configurações - Shorts API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5b21b6;
            --secondary: #00f2ea;
            --accent: #ff0050;
            --dark: #09090b;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        a {text-decoration: underline;}

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--dark); color: #fff; line-height: 1.6; min-height: 100vh; padding: 2rem; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 20% 30%, rgba(91, 33, 182, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(0, 242, 234, 0.1) 0%, transparent 50%); }

        .container { max-width: 800px; margin: 0 auto; }
        header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.2rem; font-weight: 800; background: linear-gradient(90deg, #fff, var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }

        .card { background: var(--glass); border: 1px solid var(--glass-border); padding: 2rem; border-radius: 1.5rem; backdrop-filter: blur(20px); margin-bottom: 2rem; }
        h2 { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; color: var(--secondary); font-size: 1.5rem; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.85rem; color: rgba(255,255,255,0.7); }
        input { width: 100%; padding: 0.7rem 1rem; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 0.6rem; color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--secondary); }

        .btn { padding: 0.8rem 1.5rem; border-radius: 99px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; text-decoration: none; color: #fff; }
        .btn-primary { background: var(--secondary); color: var(--dark); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 234, 0.3); }
        .btn-ghost { background: none; border: 1px solid var(--glass-border); }
        .btn-ghost:hover { background: rgba(255,255,255,0.05); }

        .alert { padding: 1rem; border-radius: 0.8rem; margin-top: 1rem; font-size: 0.9rem; border: 1px solid transparent; }
        .alert-success { background: rgba(0, 255, 0, 0.1); border-color: lime; color: #69f0ae; }
        .alert-error { background: rgba(255, 0, 0, 0.1); border-color: var(--accent); color: #ff5252; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div id="app" class="container">
        <header>
            <a href="index.html" class="logo"><i data-lucide="play-circle"></i> Shorts API</a>
            <div style="display: flex; gap: 1rem;">
                <a href="sync.html" class="btn btn-ghost" style="padding: 0.5rem 1rem;">Enviar Shorts</a>
            </div>
        </header>

        <div class="card">
            <h2><i data-lucide="settings"></i> Atualizar Configurações</h2>
            <p style="opacity: 0.6; margin-bottom: 2rem; font-size: 0.9rem;">Atualize a identidade visual e configurações do seu portal.</p>
            
            <form @submit.prevent="updateConfigs">
                <div class="form-group">
                    <label style="display: flex; justify-content: space-between;">
                        <span>API Key (Obrigatório)</span>
                        <span v-if="fetching" style="color: var(--secondary); font-size: 0.7rem;">Puxando dados...</span>
                    </label>
                    <input type="password" v-model="form.apiKey" placeholder="Sua chave secreta" required>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 1.5rem 0;">

                <div class="grid">
                    <div class="form-group">
                        <label>Título do Site</label>
                        <input v-model="form.site_title" placeholder="Meu Portal de Shorts">
                    </div>
                    <div class="form-group">
                        <label>Texto da Sidebar</label>
                        <input v-model="form.sidebar_title" placeholder="Explorar">
                    </div>
                </div>

                <div class="grid">
                    <div class="form-group">
                        <label>URL da Logo</label>
                        <input v-model="form.logo_url" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>URL do Favicon</label>
                        <input v-model="form.favicon_url" placeholder="https://...">
                    </div>
                </div>

                <div class="grid">
                    <div class="form-group">
                        <label>Google Analytics ID</label>
                        <input v-model="form.ga_id" placeholder="G-XXXXXXXXXX">
                    </div>
                    <div class="form-group">
                        <label>Cor de Fundo da Sidebar</label>
                        <input type="color" v-model="form.sidebar_bg_color" style="height: 45px; padding: 2px;">
                    </div>
                </div>

                <div style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center;">
                    <button type="button" @click="fetchSiteInfo" class="btn btn-ghost" :disabled="fetching">
                        <i data-lucide="download"></i> Recarregar Dados
                    </button>
                    <button type="submit" class="btn btn-primary" :disabled="loading || fetching" style="padding: 1rem 3rem;">
                        <i v-if="loading" data-lucide="refresh-cw" class="animate-spin"></i>
                        {{ loading ? 'Salvando...' : 'Salvar Alterações' }}
                    </button>
                </div>
            </form>

            <div v-show="success" class="alert alert-success">
                <i data-lucide="check-circle"></i> Configurações atualizadas com sucesso!
            </div>
            <div v-show="error" class="alert alert-error">
                <i data-lucide="alert-circle"></i> {{ error }}
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, onMounted, watch } = Vue;

        createApp({
            setup() {
                const loading = ref(false);
                const fetching = ref(false);
                const error = ref(null);
                const success = ref(false);

                const form = reactive({
                    apiKey: localStorage.getItem('shorts_last_api_key') || '',
                    site_title: '',
                    sidebar_title: '',
                    logo_url: '',
                    favicon_url: '',
                    ga_id: '',
                    sidebar_bg_color: '#18181b'
                });

                const fetchSiteInfo = async () => {
                    if (!form.apiKey || form.apiKey.length < 20) return;
                    
                    fetching.value = true;
                    error.value = null;
                    
                    try {
                        const res = await fetch('https://shorts.albreis.com.br/api/info', {
                            headers: { 'X-API-Key': form.apiKey }
                        });
                        if (!res.ok) throw new Error('Não foi possível carregar os dados desta chave.');
                        
                        const data = await res.json();
                        if (data.settings) {
                            form.site_title = data.settings.site_title || '';
                            form.sidebar_title = data.settings.sidebar_title || '';
                            form.logo_url = data.settings.logo_url || '';
                            form.favicon_url = data.settings.favicon_url || '';
                            form.ga_id = data.settings.ga_id || '';
                            form.sidebar_bg_color = data.settings.sidebar_bg_color || '#18181b';
                        }
                    } catch (e) {
                        error.value = e.message;
                    } finally {
                        fetching.value = false;
                    }
                };

                watch(() => form.apiKey, (newVal) => {
                    if (newVal.length >= 32) {
                        fetchSiteInfo();
                    }
                });

                const updateConfigs = async () => {
                    loading.value = true;
                    error.value = null;
                    success.value = false;

                    localStorage.setItem('shorts_last_api_key', form.apiKey);

                    try {
                        const { apiKey, ...payload } = form;
                        // Use the relative path for API or the current main domain
                        const res = await fetch('https://shorts.albreis.com.br/api/sync-configs', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'X-API-Key': apiKey
                            },
                            body: JSON.stringify(payload)
                        });

                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error || 'Erro ao atualizar configurações');

                        success.value = true;
                    } catch (e) {
                        error.value = e.message;
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(() => {
                    lucide.createIcons();
                    if (form.apiKey.length >= 32) {
                        fetchSiteInfo();
                    }
                });

                return { form, loading, error, success, updateConfigs };
            }
        }).mount('#app');
    </script>
</body>
</html>
